<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tekken 8 Win Predictor</title>
  <link rel="stylesheet" href="style.css" />
  <script>if (localStorage.getItem('tekken-theme') === 'light') document.documentElement.classList.add('light');</script>
</head>
<body>
  <main>
    <h1>Tekken 8 Win Predictor</h1>
    <p class="subtitle">Enter two player usernames to get a win prediction.</p>

    <form id="predict-form">
      <div class="players">
        <div class="player-field">
          <label for="player1">Your Username</label>
          <input id="player1" type="text" placeholder="e.g. KazuyaMain99" autocomplete="off" />
          <label for="player1-polaris">Your Polaris ID <a class="id-hint" href="https://wank.wavu.wiki/" target="_blank" rel="noopener noreferrer">*find here</a></label>
          <input id="player1-polaris" type="text" placeholder="e.g. 379Jq8LBFQbM" autocomplete="off" />
          <label for="player1-char">Your Character</label>
          <input id="player1-char" type="text" list="char-list" placeholder="e.g. Kazuya Mishima" autocomplete="off" />
        </div>

        <div class="vs">VS</div>

        <div class="player-field">
          <label for="player2">Opponent Username</label>
          <input id="player2" type="text" placeholder="e.g. DragonFistKing" autocomplete="off" />
          <label for="player2-polaris">Opponent Polaris ID <a class="id-hint" href="https://wank.wavu.wiki/" target="_blank" rel="noopener noreferrer">*find here</a></label>
          <input id="player2-polaris" type="text" placeholder="e.g. 2iD4DQA57aEG" autocomplete="off" />
          <label for="player2-char">Opponent Character</label>
          <input id="player2-char" type="text" list="char-list" placeholder="e.g. King" autocomplete="off" />
        </div>
      </div>

      <button type="submit" id="submit-btn">Predict</button>
    </form>

    <section id="result" class="hidden">
      <div class="result-card">
        <div class="win-bar-container">
          <div id="win-bar" class="win-bar"></div>
        </div>
        <div class="win-labels">
          <span id="label-p1" class="win-label"></span>
          <span id="label-p2" class="win-label right"></span>
        </div>
        <p id="explanation" class="explanation"></p>
      </div>
    </section>

    <section id="error-msg" class="hidden error">
      <p id="error-text"></p>
    </section>

    <div class="quiz-cta">
      <span class="quiz-cta-label">New to Tekken 8?</span>
      <a href="quiz.html" class="quiz-cta-btn">Find your character →</a>
    </div>
  </main>

  <button id="theme-toggle" class="theme-toggle">☀ Light</button>
  <datalist id="char-list"></datalist>
  <script src="characters.js"></script>
  <script>
    CHARACTERS.forEach(c => {
      const opt = document.createElement('option');
      opt.value = c.name;
      document.getElementById('char-list').appendChild(opt);
    });
  </script>
  <script src="app.js"></script>
  <script src="theme.js"></script>
</body>
</html>
