<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tekken 8 Win Predictor</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main>
    <h1>Tekken 8 Win Predictor</h1>
    <p class="subtitle">Enter two player usernames to get a win prediction.</p>

    <form id="predict-form">
      <div class="players">
        <div class="player-field">
          <label for="player1">Your Username</label>
          <input id="player1" type="text" placeholder="e.g. KazuyaMain99" autocomplete="off" required />
          <input id="player1-char" type="text" class="char-input" placeholder="Character (e.g. Kazuya)" autocomplete="off" />
        </div>

        <div class="vs">VS</div>

        <div class="player-field">
          <label for="player2">Opponent Username</label>
          <input id="player2" type="text" placeholder="e.g. DragonFistKing" autocomplete="off" required />
          <input id="player2-char" type="text" class="char-input" placeholder="Character (e.g. Jin)" autocomplete="off" />
        </div>
      </div>

      <button type="submit" id="submit-btn">Predict</button>
    </form>

    <section id="result" class="hidden">
      <div class="result-card">
        <div class="win-bar-container">
          <div id="win-bar" class="win-bar"></div>
        </div>
        <div class="win-labels">
          <span id="label-p1" class="win-label"></span>
          <span id="label-p2" class="win-label right"></span>
        </div>
        <p id="explanation" class="explanation"></p>
      </div>
    </section>

    <section id="error-msg" class="hidden error">
      <p id="error-text"></p>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
